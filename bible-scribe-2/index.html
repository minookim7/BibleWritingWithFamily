<!doctype html>
<html lang="ko" data-theme="ink">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>성경 필사 — 리추얼</title>
  <meta name="description" content="한 구절씩 옮겨 적는 성경 필사. 속도가 아니라 머무름을 위한 도구." />
  <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="sr-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <a href="#main" class="skip-link">본문으로 건너뛰기</a>

  <!-- ============ 상단 바 ============ -->
  <header class="bar" role="banner">
    <button class="bar-brand" id="btn-home" aria-label="처음으로">
      <span class="brand-mark" aria-hidden="true">﹅</span>
      <span class="brand-name">성경 필사</span>
    </button>
    <div class="bar-actions">
      <button class="ghost-btn" id="btn-records" aria-label="기록 보기">기록</button>
      <button class="ghost-btn" id="btn-theme" aria-label="테마 전환">◐</button>
      <button class="ghost-btn" id="btn-settings" aria-label="설정 열기">⚙</button>
    </div>
  </header>

  <main id="main">
    <!-- ============ 선택 화면 ============ -->
    <section class="view" id="view-select" aria-label="본문 선택">
      <div class="select-wrap">
        <p class="eyebrow">Transcribing as ritual</p>
        <h1 class="select-title">오늘, 어떤 말씀을<br>옮겨 적을까요</h1>

        <div class="quick-row">
          <button class="pill" id="btn-today">오늘의 구절</button>
          <button class="pill" id="btn-random">무작위</button>
          <button class="pill" id="btn-resume" hidden>이어서 하기</button>
        </div>

        <div class="picker">
          <label class="field">
            <span class="field-label">책</span>
            <select id="select-book" class="select"></select>
          </label>
          <label class="field">
            <span class="field-label">장</span>
            <select id="select-chapter" class="select"></select>
          </label>
          <button class="start-btn" id="btn-start">필사 시작</button>
        </div>

        <div class="search-box">
          <input type="search" id="search-input" class="search-input"
                 placeholder="불러온 본문에서 검색 (예: 사랑, 태초)" aria-label="본문 검색" />
          <div id="search-results" class="search-results" role="listbox" aria-label="검색 결과"></div>
        </div>

        <div class="two-col">
          <div class="col">
            <h2 class="col-title">이어서 하기</h2>
            <div id="resume-list" class="chip-list"></div>
          </div>
          <div class="col">
            <h2 class="col-title">즐겨찾기</h2>
            <div id="fav-list" class="chip-list"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ 필사 화면 (고정 시선) ============ -->
    <section class="view" id="view-scribe" hidden aria-label="필사">
      <div class="scribe-head">
        <span id="scribe-ref" class="scribe-ref"></span>
        <div class="scribe-head-actions">
          <button class="ghost-btn" id="btn-fav" aria-label="즐겨찾기 토글">☆</button>
          <button class="ghost-btn" id="btn-memorize" aria-label="암송 모드">암송</button>
          <button class="ghost-btn" id="btn-exit">나가기</button>
        </div>
      </div>

      <!-- 고정 시선: 현재 구절이 중앙에 머문다 -->
      <div class="gaze" id="gaze">
        <div class="passage" id="passage" aria-hidden="true"></div>
      </div>

      <!-- 실제 입력(화면엔 안 보이지만 포커스 유지) -->
      <textarea id="typing-input" class="typing-input" autocomplete="off"
                autocapitalize="off" autocorrect="off" spellcheck="false"
                aria-label="필사 입력창"></textarea>

      <!-- 하단 상태 표시줄 -->
      <div class="hud">
        <div class="hud-progress"><span id="progress-fill" class="hud-progress-fill"></span></div>
        <div class="hud-stats">
          <span class="stat"><b id="stat-progress">0%</b> 진행</span>
          <span class="stat"><b id="stat-cpm">0</b> 타/분</span>
          <span class="stat"><b id="stat-accuracy">100%</b> 정확도</span>
          <span class="stat"><b id="stat-time">0:00</b></span>
          <span class="stat sub"><b id="stat-mistakes">0</b> 오타</span>
        </div>
      </div>
      <p class="autosave-note" id="autosave-note" aria-live="polite"></p>
    </section>

    <!-- ============ 완료 화면 ============ -->
    <section class="view" id="view-done" hidden aria-label="완료">
      <div class="done-wrap">
        <div class="done-mark" aria-hidden="true">✦</div>
        <p class="done-ref" id="done-ref"></p>
        <h2 class="done-title">한 편의 필사를 마쳤습니다</h2>
        <div class="done-stats">
          <div class="done-stat"><b id="done-time">0:00</b><span>걸린 시간</span></div>
          <div class="done-stat"><b id="done-cpm">0</b><span>평균 타/분</span></div>
          <div class="done-stat"><b id="done-accuracy">100%</b><span>정확도</span></div>
        </div>
        <div class="done-actions">
          <button class="start-btn" id="btn-next">다음 장 이어서</button>
          <button class="ghost-btn" id="btn-retry">다시 필사</button>
          <button class="ghost-btn" id="btn-done-home">처음으로</button>
        </div>
      </div>
    </section>

    <!-- ============ 기록 화면 ============ -->
    <section class="view" id="view-records" hidden aria-label="기록">
      <div class="records-wrap">
        <div class="records-head">
          <h2 class="col-title">필사 기록</h2>
          <button class="ghost-btn" id="btn-records-back">닫기</button>
        </div>
        <div class="record-grid" id="record-grid"></div>
        <h3 class="col-title" style="margin-top:28px">이번 달</h3>
        <div class="cal-head">
          <button class="ghost-btn" id="cal-prev" aria-label="이전 달">‹</button>
          <span id="cal-label"></span>
          <button class="ghost-btn" id="cal-next" aria-label="다음 달">›</button>
        </div>
        <div class="calendar" id="calendar" role="grid"></div>
        <button class="ghost-btn" id="btn-export" style="margin-top:20px">CSV 내보내기</button>
      </div>
    </section>
  </main>

  <!-- ============ 설정 시트 ============ -->
  <div class="overlay" id="settings-overlay" hidden role="dialog" aria-modal="true" aria-label="설정">
    <div class="sheet">
      <div class="sheet-head">
        <h2>설정</h2>
        <button class="ghost-btn" id="btn-settings-close" aria-label="설정 닫기">✕</button>
      </div>
      <div class="sheet-body">
        <label class="row"><span>테마</span>
          <select id="set-theme" class="select">
            <option value="ink">먹 (어둠)</option>
            <option value="paper">한지 (밝음)</option>
            <option value="sepia">세피아</option>
          </select>
        </label>
        <label class="row"><span>본문 글꼴</span>
          <select id="set-font" class="select">
            <option value="serif">명조 (필사체)</option>
            <option value="sans">고딕</option>
          </select>
        </label>
        <label class="row"><span>글자 크기</span>
          <input type="range" id="set-size" min="20" max="40" step="1" />
        </label>
        <label class="row"><span>줄 간격</span>
          <input type="range" id="set-line" min="1.5" max="2.6" step="0.1" />
        </label>
        <label class="row"><span>자동 저장 (이어하기)</span>
          <input type="checkbox" id="set-autosave" />
        </label>
        <label class="row"><span>타건음</span>
          <input type="checkbox" id="set-sfx" />
        </label>
        <label class="row"><span>배경음</span>
          <select id="set-track" class="select">
            <option value="none">없음</option>
            <option value="rain">빗소리</option>
            <option value="birds">새소리</option>
            <option value="forest">숲</option>
            <option value="stream">시냇물</option>
            <option value="piano">피아노</option>
          </select>
        </label>
        <label class="row"><span>배경음 볼륨</span>
          <input type="range" id="set-volume" min="0" max="100" step="5" />
        </label>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
